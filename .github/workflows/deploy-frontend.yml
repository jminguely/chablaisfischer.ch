name: Frontend CI + Deploy + Check-In

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-frontend.yml
      - frontend/**
  workflow_dispatch:

jobs:
  frontend-ci-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          WP_GRAPHQL_ENDPOINT: ${{ vars.GRAPHQL_API_URL }}
        run: |
          cd frontend
          npm run build

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Deploy .output via rsync mirror
        env:
          IK_USER: ${{ secrets.IK_USER }}
          IK_SERVER: ${{ secrets.IK_SERVER }}
          IK_PASSWORD: ${{ secrets.IK_PASSWORD }}
          IK_FOLDER: ${{ secrets.IK_FOLDER }}
        run: |
          set -euo pipefail

          if [[ -z "${IK_USER}" || -z "${IK_SERVER}" || -z "${IK_PASSWORD}" || -z "${IK_FOLDER}" ]]; then
            echo "One or more IK_* secrets are missing."
            exit 1
          fi

          # Mirror the exact build output to avoid stale or partial files between deploys.
          RSYNC_SSH="sshpass -p ${IK_PASSWORD} ssh -o StrictHostKeyChecking=accept-new"
          rsync -az --delete -e "${RSYNC_SSH}" ./frontend/.output/ "${IK_USER}@${IK_SERVER}:${IK_FOLDER}/"

      - name: Verify deployed build files on server
        env:
          IK_USER: ${{ secrets.IK_USER }}
          IK_SERVER: ${{ secrets.IK_SERVER }}
          IK_PASSWORD: ${{ secrets.IK_PASSWORD }}
          IK_FOLDER: ${{ secrets.IK_FOLDER }}
        run: |
          set -euo pipefail

          LOCAL_LATEST_JSON=$(cat ./frontend/.output/public/_nuxt/builds/latest.json)
          LOCAL_LATEST_ID=$(node -e 'const s = process.argv[1] || "{}"; try { const o = JSON.parse(s); process.stdout.write(o.id || ""); } catch { process.stdout.write(""); }' "${LOCAL_LATEST_JSON}")

          if [[ -z "${LOCAL_LATEST_ID}" ]]; then
            echo "Could not parse local latest build ID"
            exit 1
          fi

          REMOTE_META_PATH="${IK_FOLDER}/public/_nuxt/builds/meta/${LOCAL_LATEST_ID}.json"
          echo "Checking remote meta path: ${REMOTE_META_PATH}"

          sshpass -p "${IK_PASSWORD}" ssh -o StrictHostKeyChecking=accept-new "${IK_USER}@${IK_SERVER}" "test -f '${REMOTE_META_PATH}'"

      - name: Restart frontend process (optional)
        env:
          IK_USER: ${{ secrets.IK_USER }}
          IK_SERVER: ${{ secrets.IK_SERVER }}
          IK_PASSWORD: ${{ secrets.IK_PASSWORD }}
          IK_RESTART_COMMAND: ${{ secrets.IK_RESTART_COMMAND }}
          IK_MANAGER_RESTART_URL: ${{ secrets.IK_MANAGER_RESTART_URL }}
          IK_MANAGER_COOKIE: ${{ secrets.IK_MANAGER_COOKIE }}
          IK_MANAGER_XSRF_TOKEN: ${{ secrets.IK_MANAGER_XSRF_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -n "${IK_MANAGER_RESTART_URL}" && -n "${IK_MANAGER_COOKIE}" && -n "${IK_MANAGER_XSRF_TOKEN}" ]]; then
            echo "Running Infomaniak Manager API restart"

            RESPONSE=$(curl -fsSL \
              -X POST \
              -H "Accept: application/json, text/plain, */*" \
              -H "Content-Type: application/json" \
              -H "X-Requested-With: XMLHttpRequest" \
              -H "X-XSRF-TOKEN: ${IK_MANAGER_XSRF_TOKEN}" \
              -H "Cookie: ${IK_MANAGER_COOKIE}" \
              "${IK_MANAGER_RESTART_URL}" \
              -d '{}')

            echo "${RESPONSE}"

            if ! echo "${RESPONSE}" | grep -q '"result":"success"'; then
              echo "Infomaniak Manager API restart failed"
              exit 1
            fi

            exit 0
          fi

          if [[ -z "${IK_RESTART_COMMAND}" ]]; then
            echo "No restart method configured. Skipping remote restart."
            exit 0
          fi

          echo "Running remote restart command"
          sshpass -p "${IK_PASSWORD}" ssh -o StrictHostKeyChecking=accept-new "${IK_USER}@${IK_SERVER}" "${IK_RESTART_COMMAND}"

      - name: Post-deploy check-in
        run: |
          set -euo pipefail

          SITE_URL="https://chablaisfischer.ch"
          echo "Using SITE_URL=${SITE_URL}"

          SUCCESS=0
          TS=$(date +%s)

          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}/6"

            SSR_ID=$(curl -fsSL "${SITE_URL}/?v=${TS}-${attempt}" | grep -o 'buildId:"[^"]*"' | head -1 | sed 's/buildId:"//; s/"//')
            LATEST_JSON=$(curl -fsSL "${SITE_URL}/_nuxt/builds/latest.json?v=${TS}-${attempt}")
            LATEST_ID=$(node -e 'const s = process.argv[1] || "{}"; try { const o = JSON.parse(s); process.stdout.write(o.id || ""); } catch { process.stdout.write(""); }' "${LATEST_JSON}")

            if [[ -z "${SSR_ID}" || -z "${LATEST_ID}" ]]; then
              echo "Could not parse SSR_ID or LATEST_ID"
              sleep 10
              continue
            fi

            META_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}/_nuxt/builds/meta/${LATEST_ID}.json?v=${TS}-${attempt}")

            echo "SSR_ID=${SSR_ID}"
            echo "LATEST_ID=${LATEST_ID}"
            echo "META_CODE=${META_CODE}"

            if [[ "${SSR_ID}" == "${LATEST_ID}" && "${META_CODE}" == "200" ]]; then
              echo "Post-deploy check-in passed"
              SUCCESS=1
              break
            fi

            sleep 10
          done

          if [[ "${SUCCESS}" != "1" ]]; then
            echo "Post-deploy check-in failed: build mismatch or missing meta file"
            exit 1
          fi

          for path in / /index /projets /atelier; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}${path}")
            echo "${CODE} ${path}"
            if [[ "${CODE}" != "200" ]]; then
              echo "Smoke check failed on ${path}"
              exit 1
            fi
          done
